name: CI

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  website:
    name: Website Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.0.23

      - name: Install website dependencies
        run: bun install

      - name: Build website
        run: bun run build

  dlq-demo:
    name: DLQ Demo Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Run DLQ demo tests
        working-directory: website/examples/kafka/kip-1034-dlq-blog-post
        env:
          GRADLE_USER_HOME: ${{ runner.temp }}/gradle-home
        run: ./gradlew test
